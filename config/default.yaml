agent:
  max_steps: 20
  step_timeout: 60
  retry_max: 3
  replan_max: 5
  screenshot_on_error: true

llm:
  provider: deepseek            # deepseek | anthropic | openai | local
  model: deepseek-chat          # deepseek-chat (V3) | deepseek-reasoner (R1)
  base_url: "https://api.deepseek.com"
  temperature: 0.3
  max_tokens: 4096

vision:
  provider: agnes               # agnes | anthropic | openai | deepseek | local
  model: agnes-2.0-flash        # agnes-2.0-flash (推荐，256K上下文，支持视觉)
  base_url: "https://apihub.agnes-ai.com/v1"
  transport: mcp                # mcp | direct
  mcp_command: ""               # 留空时使用当前 Python 解释器
  mcp_args: ["-m", "src.vision_mcp.agnes_server"]
  timeout_seconds: 60

image_gen:
  provider: openai
  model: dall-e-3
  default_size: "1024x1024"

browser:
  engine: playwright
  headless: false
  viewport_width: 1280
  viewport_height: 720
  user_data_dir: "./browser_data"

desktop:
  screenshot_dir: "./screenshots"
  app_paths:
    wps: "C:\\Program Files\\Kingsoft\\WPS Office\\wps.exe"
    wechat: "C:\\Program Files\\Tencent\\WeChat\\WeChat.exe"

logging:
  level: INFO
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {module}:{function} | {message}"
  rotation: "10 MB"
  retention: "7 days"
